# ──────────────────────────────────────────────────────
# 🔥 Kiln — AI-Powered Dev Pipeline
#
# Copy this file into any repo at .github/workflows/kiln.yml
# and add ANTHROPIC_API_KEY to your repo secrets.
# ──────────────────────────────────────────────────────

name: "🔥 Kiln"

on:
  # Triage: classify new issues; Specify/Implement: start when labeled
  issues:
    types: [opened, labeled]

  # Re-triage: re-evaluate after author replies to needs-info
  issue_comment:
    types: [created]

  # Review: AI reviews new/updated implementation PRs
  pull_request:
    types: [opened, synchronize]

  # Approve-spec: merge spec on approval; Fix: address review feedback; Ship: merge on approval
  pull_request_review:
    types: [submitted]

  # Ship: auto-merge when CI passes on approved PRs
  check_suite:
    types: [completed]

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  kiln:
    runs-on: ubuntu-latest
    # Don't run on events triggered by Kiln itself
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: datashaman/kiln-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
